version: '3.8'

services:
  # Web Application
  web:
    image: petshop-web:latest
    container_name: petshop_web
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@db:5432/petshop
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    depends_on:
      - db
      - redis
    networks:
      - petshop-network
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: petshop_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=petshop
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - petshop-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: petshop_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - petshop-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: petshop_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - web
    networks:
      - petshop-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  petshop-network:
    driver: bridge
