apiVersion: apps/v1
kind: Deployment
metadata:
  name: petshop-web
  namespace: production
  labels:
    app: petshop
    component: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: petshop
      component: web
  template:
    metadata:
      labels:
        app: petshop
        component: web
    spec:
      containers:
      - name: web
        image: petshop/web:v1.0.0
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: petshop-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://petshop-redis:6379"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: petshop-web
  namespace: production
spec:
  type: LoadBalancer
  selector:
    app: petshop
    component: web
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petshop-db
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petshop
      component: db
  template:
    metadata:
      labels:
        app: petshop
        component: db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "petshop"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: petshop-secrets
              key: db-username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: petshop-secrets
              key: db-password
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: petshop-db
  namespace: production
spec:
  selector:
    app: petshop
    component: db
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: production
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
